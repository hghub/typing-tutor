    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — SoftwareApplication (JSON-LD)
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Typing Master",
      "url": "https://typingmaster.app",
      "description": "Free online typing speed test and multilingual typing tutor. Practice in English, Arabic, Urdu, Persian or any custom text. Track WPM, CPM, accuracy and compete globally.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "512"
      },
      "featureList": [
        "Real-time WPM and CPM measurement",
        "Accuracy tracking",
        "Multilingual support: English, Arabic, Urdu, Persian",
        "Right-to-left (RTL) script support",
        "Custom text practice in any language",
        "60-second timer mode",
        "Global leaderboard with country and city filters",
        "Personal best tracking",
        "Dark and light mode",
        "Keyboard sound effects",
        "Session statistics and CSV export",
        "No registration required"
      ],
      "screenshot": "https://typingmaster.app/og-image.png",
      "inLanguage": ["en", "ar", "ur", "fa"]
    }
    </script>

    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — WebSite + SearchAction
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Typing Master",
      "url": "https://typingmaster.app",
      "description": "Free multilingual typing speed test — English, Arabic, Urdu, Persian and custom text",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://typingmaster.app/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — FAQPage (boosts rich snippets)
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a good typing speed in WPM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The average typing speed is 40 WPM. A speed of 60+ WPM is considered above average, and professional typists typically reach 75–100 WPM. Top competitive typists exceed 120 WPM."
          }
        },
        {
          "@type": "Question",
          "name": "How can I improve my typing speed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Practice daily with a structured typing tutor. Focus on accuracy first, then speed. Use all fingers with proper home-row technique. Taking regular timed WPM tests helps track and motivate improvement."
          }
        },
        {
          "@type": "Question",
          "name": "Does this typing test support Arabic and Urdu?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Typing Master fully supports Arabic, Urdu, and Persian with proper right-to-left (RTL) text rendering. You can also paste any custom text in any language or script."
          }
        },
        {
          "@type": "Question",
          "name": "Is Typing Master free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Typing Master is completely free. No account or sign-up is required to take a typing test. An optional identity (Name#code) lets you appear on the global leaderboard."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between WPM and CPM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WPM (Words Per Minute) measures typing speed assuming 5 characters per word. CPM (Characters Per Minute) counts every character typed. Both are shown in real time on Typing Master."
          }
        }
      ]
    }
    </script>
