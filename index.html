    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — FAQPage (boosts rich snippets)
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a good typing speed in WPM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The average typing speed is 40 WPM. A speed of 60+ WPM is considered above average, and professional typists typically reach 75–100 WPM. Top competitive typists exceed 120 WPM."
          }
        },
        {
          "@type": "Question",
          "name": "How can I improve my typing speed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Practice daily with a structured typing tutor. Focus on accuracy first, then speed. Use all fingers with proper home-row technique. Taking regular timed WPM tests helps track and motivate improvement."
          }
        },
        {
          "@type": "Question",
          "name": "Does this typing test support Arabic and Urdu?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Typely fully supports Arabic, Urdu, and Persian with proper right-to-left (RTL) text rendering. You can also paste any custom text in any language or script."
          }
        },
        {
          "@type": "Question",
          "name": "Is Typely free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Typely is completely free. No account or sign-up is required to take a typing test. An optional identity (Name#code) lets you appear on the global leaderboard."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between WPM and CPM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WPM (Words Per Minute) measures typing speed assuming 5 characters per word. CPM (Characters Per Minute) counts every character typed. Both are shown in real time on Typely."
          }
        }
      ]
    }
    </script>
