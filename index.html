    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Rafiqy",
      "description": "A simple digital companion for everyday tasks — 62 free browser-based tools for productivity, finance, PDF, typing, and more. No sign-up required.",
      "url": "https://rafiqy.app",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": "Pakistan Tax Calculator FBR 2025-26, Expense Analyzer, Data Leak Detector, Drug Interaction Checker, Typing Speed Test, Word Counter, Text Formatter, Doc Redaction, Freelancer Risk Analyzer, Warranty Tracker, Driving Fine Tracker, Currency Converter, Packing List, Budget Splitter, Urdu Keyboard, Markdown Scraper, Log Analyzer, Mock Data Generator, Config Converter, Student Group Randomizer, Timeline Builder, Position Size Calculator, Voice Invoice",
      "inLanguage": ["en", "ur"],
      "audience": {
        "@type": "Audience",
        "audienceType": "Developers, Students, Freelancers, Finance Professionals, Healthcare Workers, Travelers, Teachers"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Rafiqy",
      "url": "https://rafiqy.app",
      "description": "A simple digital companion for everyday tasks — 62 free browser-based tools for productivity, finance, PDF, typing, and more.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://rafiqy.app/tools?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════════
         STRUCTURED DATA — FAQPage (boosts rich snippets)
    ═══════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Are these tools really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, all 62 tools on Rafiqy are completely free. There are no hidden fees, no premium tiers, and no ads. No account or sign-up is ever required."
          }
        },
        {
          "@type": "Question",
          "name": "Does my data stay private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All tools run entirely in your browser. Your documents, financial data, and personal information are never uploaded to any server — everything is processed locally on your device."
          }
        },
        {
          "@type": "Question",
          "name": "Is the Pakistan Tax Calculator accurate for FY 2025-26?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the tax calculator uses the official FBR slab rates from the Finance Act 2025 for Tax Year 2026 (FY 2025-26): 0%, 1%, 11%, 23%, 30%, and 35%. It includes surcharge, VPS shields, charity deductions, and senior citizen rebate. Always verify with a certified tax practitioner before filing."
          }
        },
        {
          "@type": "Question",
          "name": "Do the tools work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most tools work fully offline once the page is loaded, since they run entirely in your browser with no server calls. Some tools like Currency Converter and Drug Checker require internet to fetch live data."
          }
        },
        {
          "@type": "Question",
          "name": "What is a good typing speed in WPM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The average typing speed is 40 WPM. A speed of 60+ WPM is considered above average, and professional typists typically reach 75–100 WPM. Top competitive typists exceed 120 WPM."
          }
        }
      ]
    }
    </script>
